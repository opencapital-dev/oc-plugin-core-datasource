name: publish
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: magefile/mage-action@v3
        with:
          install-only: true
      # go-sqlcipher links against OpenSSL (CGO_ENABLED=1 in Magefile.go).
      # gcc-aarch64-linux-gnu is required for the linux-arm64 cross-compile.
      - name: install C cross-compilers
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev
      - name: build frontend
        run: npm ci && npm run build
      # Build only the Linux targets: CGO cross-compilation for Darwin/Windows
      # requires host toolchains that are not available on ubuntu-latest.
      # The assembler is told to package only linux-amd64,linux-arm64 to match.
      - name: build backend (linux-amd64 + linux-arm64)
        run: |
          mage build:linux
          CC=aarch64-linux-gnu-gcc mage build:linuxARM64
      - uses: sigstore/cosign-installer@v3
      - uses: ignacioballester/oc-plugin-publish-action@v1
        with:
          dir: .
          id: core-datasource
          owner: ignacioballester
          version: ${{ github.ref_name }}
          platforms: linux-amd64,linux-arm64
