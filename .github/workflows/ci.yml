name: ci

# PR gate: lint + unit tests only. No plugin build, no e2e, no packaging —
# the release pipeline (publish.yml -> reusable plugin-release.yml on merge)
# owns building, signing and publishing.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: unit tests
        run: npm run test:ci

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: backend lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: ./...
      - name: backend test
        uses: magefile/mage-action@a662bd8c29d8106879588cfff83b2faf6e6f59db # v4.0.0
        with:
          version: latest
          args: test
