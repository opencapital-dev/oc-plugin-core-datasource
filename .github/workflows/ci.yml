name: ci

# PR gate: lint + unit tests only. No plugin build, no e2e, no packaging —
# the release pipeline (publish.yml -> reusable plugin-release.yml on merge)
# owns building, signing and publishing.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: unit tests
        run: npm run test:ci

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: backend lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          args: ./...
      - name: backend test
        uses: magefile/mage-action@6f50bbb8ea47d56e62dee92392788acbc8192d0b # v3.1.0
        with:
          version: latest
          args: test
